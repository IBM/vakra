name: m3-benchmark

# Alternative to `make start` / `python m3_setup.py --start-containers`.
# Requires the image to be built or pulled first:
#   make build          (build locally)
#   make pull           (pull from Docker Hub)
#
# Usage:
#   docker compose up -d                           # start all task containers
#   docker compose down                            # stop and remove containers
#   docker compose logs -f                         # tail all logs
#   docker compose up -d task_5_m3_environ         # start a single task
#
# The benchmark runner and MCP clients connect via docker exec (stdio),
# not via exposed ports. No port mapping is needed here.

x-base: &base
  image: m3_environ
  environment:
    MCP_DB_ROOT: /app/db
  volumes:
    - ./data/db:/app/db:ro
    - ./apis/configs:/app/apis/configs:ro

services:
  task_1_m3_environ:
    <<: *base
    container_name: task_1_m3_environ

  task_2_m3_environ:
    <<: *base
    container_name: task_2_m3_environ

  task_3_m3_environ:
    <<: *base
    container_name: task_3_m3_environ

  task_5_m3_environ:
    <<: *base
    container_name: task_5_m3_environ
    mem_limit: 4g
    volumes:
      - ./data/db:/app/db:ro
      - ./apis/configs:/app/apis/configs:ro
      - ./data/chroma_data:/app/retrievers/chroma_data
      - ./data/queries:/app/retrievers/queries:ro
