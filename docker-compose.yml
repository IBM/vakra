name: m3-benchmark

# Alternative to `make start` / `python m3_setup.py --start-containers`.
# Requires the image to be built or pulled first:
#   make build          (build locally)
#   make pull           (pull from Docker Hub)
#
# Usage:
#   docker compose up -d                                        # start all capability containers
#   docker compose down                                         # stop and remove containers
#   docker compose logs -f                                      # tail all logs
#   docker compose up -d capability_4_multiturn_m3_environ      # start a single capability
#
# The benchmark runner and MCP clients connect via docker exec (stdio),
# not via exposed ports. No port mapping is needed here.

x-base: &base
  image: m3_environ
  environment:
    MCP_DB_ROOT: /app/db
  volumes:
    - ./data/databases:/app/db:ro
    - ./apis/configs:/app/apis/configs:ro

services:
  capability_1_bi_apis_m3_environ:
    <<: *base
    container_name: capability_1_bi_apis_m3_environ

  capability_2_dashboard_apis_m3_environ:
    <<: *base
    container_name: capability_2_dashboard_apis_m3_environ

  capability_3_multihop_reasoning_m3_environ:
    <<: *base
    container_name: capability_3_multihop_reasoning_m3_environ

  capability_4_multiturn_m3_environ:
    <<: *base
    container_name: capability_4_multiturn_m3_environ
    mem_limit: 4g
    volumes:
      - ./data/databases:/app/db:ro
      - ./apis/configs:/app/apis/configs:ro
      - ./indexed_documents:/app/retrievers/chroma_data
      - ./data/queries:/app/retrievers/queries:ro
