tasks:
  # All tasks use the unified m3_environ container via docker exec.
  # Start the containers first:
  #   docker run -d --name task_1_m3_environ \
  #       -v "$(pwd)/apis/m3/rest/db:/app/db:ro" \
  #       -v "$(pwd)/apis/configs:/app/apis/configs:ro" \
  #       m3_environ
  #   docker run -d --name task_2_m3_environ \
  #       -v "$(pwd)/apis/m3/rest/db:/app/db:ro" \
  #       -v "$(pwd)/apis/configs:/app/apis/configs:ro" \
  #       m3_environ
  #   docker run -d --name task_5_m3_environ \
  #       -v "$(pwd)/apis/m3/rest/db:/app/db:ro" \
  #       -v "$(pwd)/apis/configs:/app/apis/configs:ro" \
  #       -v "$(pwd)/apis/retrievers/chroma_data:/app/retrievers/chroma_data" \
  #       -v "$(pwd)/apis/retrievers/queries:/app/retrievers/queries:ro" \
  #       m3_environ

  # Task 1: ToolCallingAgent + SlotFillingMCPServer
  1:
    mode: stdio
    container_name: task_1_m3_environ
    container_runtime: docker
    container_command:
      - python
      - "-m"
      - "apis.m3.python_tools.mcp"

  # Task 2: LangGraphReActAgent + FastAPIMCPServer
  2:
    mode: stdio
    container_name: task_2_m3_environ
    container_runtime: docker
    container_command:
      - python
      - /app/m3-rest/mcp_server.py

  # Task 5: LangGraphReActAgent + RetrieverMCPServer (ChromaDB)
  5:
    mode: stdio
    container_name: task_5_m3_environ
    container_runtime: docker
    container_command:
      - python
      - /app/retrievers/mcp_server.py

  # --- Per-task container setup (no unified image) ---
  # Task 1 runs as a local Python subprocess (no container needed).
  # Tasks 2 and 5 use dedicated per-domain containers.
  #
  # 1:
  #   mode: stdio
  #   command: python  # resolved to sys.executable at runtime
  #   args:
  #     - "-m"
  #     - "apis.m3.python_tools.mcp"
  #
  # 2:
  #   mode: stdio
  #   container_name: fastapi-mcp-server
  #   container_runtime: null  # null = auto-detect (prefers podman, falls back to docker)
  #   container_command:
  #     - python
  #     - mcp_server.py
  #
  # 5:
  #   mode: stdio
  #   container_name: retriever-mcp-server
  #   container_runtime: null  # null = auto-detect (prefers podman, falls back to docker)
  #   container_command:
  #     - python
  #     - mcp_server.py
