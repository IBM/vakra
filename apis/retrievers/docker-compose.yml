services:
  retriever-mcp:
    build: .
    container_name: retriever-mcp-server
    command: >
      bash -c "
        uvicorn server:app --host 0.0.0.0 --port 8001 &
        echo 'Waiting for FastAPI retriever server...' &&
        until curl -sf http://localhost:8001/health > /dev/null 2>&1; do sleep 1; done &&
        echo 'FastAPI is up, starting MCP server...' &&
        python mcp_server.py
      "
    ports:
      - "8001:8001"
    environment:
      - FASTAPI_BASE_URL=http://localhost:8001
      - MCP_DOMAIN=${MCP_DOMAIN:-}
      - PRELOAD_COLLECTIONS=true
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./queries:/app/queries:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stdin_open: true
    tty: true
