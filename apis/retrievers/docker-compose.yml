services:
  retriever-mcp:
    image: docker.io/amurthi44g1wd/retriever-mcp:latest
    # To build locally instead, comment out 'image' above and uncomment:
    # build: .

    container_name: retriever-mcp-server
    ports:
      - "8001:8001"
    environment:
      - FASTAPI_BASE_URL=http://localhost:8001
      - MCP_DOMAIN=${MCP_DOMAIN:-}
      - PRELOAD_COLLECTIONS=true
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./queries:/app/queries:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stdin_open: true
    tty: true
