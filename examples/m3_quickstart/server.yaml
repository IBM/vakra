# Enterprise Benchmark — MCP server connection config for all 4 capabilities
#
# Each capability connects to a running Docker container via `docker exec` (stdio transport).
# Start all containers first:
#   docker compose up -d
#
# Then run the quickstart:
#   python examples/m3_quickstart/run_benchmark.py --capability-id 2 --domain hockey

capabilities:

  # ── Capability 1: Python slot-filling server ────────────────────────────────
  # Tests tool SELECTION (choosing the right tool from a large set) and
  # SLOT FILLING (supplying the correct parameter values).
  # RouterMCPServer routes each query to SlotFilling or Selection sub-server.
  1:
    container: capability_1_bi_apis
    env:
      MCP_DB_ROOT: /app/db
      CAPABILITY_ID: "1"
    command:
      - python
      - /app/mcp_dispatch.py

  # ── Capability 2: M3 REST SQL server (83 domains) ──────────────────────────
  # Tests SQL query construction via a FastAPI MCP wrapper.
  # Each domain is an independent SQLite database with its own set of
  # REST endpoints exposed as MCP tools.
  2:
    container: capability_2_dashboard_apis
    env:
      MCP_DB_ROOT: /app/db
      CAPABILITY_ID: "2"
    command:
      - python
      - /app/mcp_dispatch.py

  # ── Capability 3: Hybrid BPO + M3 REST server ──────────────────────────────
  # Routes by MCP_DOMAIN:
  #   domain=bpo   → BPO FastMCP server (analytics / HR / SLA tools)
  #   other domain → M3 REST MCP server (SQL tools)
  3:
    container: capability_3_multihop_reasoning
    env:
      MCP_DB_ROOT: /app/db
      CAPABILITY_ID: "3"
    command:
      - python
      - /app/mcp_dispatch.py

  # ── Capability 4: M3 REST + Retriever (multi-turn, 52 domains) ─────────────
  # Combines M3 SQL tools (port 8000) with a ChromaDB semantic retriever
  # (port 8001) in a single MCP server. Tests whether the agent can correctly
  # choose between SQL lookup and vector search.
  4:
    container: capability_4_multiturn
    env:
      MCP_DB_ROOT: /app/db
      CAPABILITY_ID: "4"
      PRELOAD_COLLECTIONS: "false"
    command:
      - python
      - /app/mcp_dispatch.py
