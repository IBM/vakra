tasks:
  # All tasks use the unified m3_environ container via docker exec.
  # CAPABILITY_ID selects the MCP server inside the container via mcp_dispatch.py.
  # MCP_DB_ROOT sets the parent directory for domain databases inside the container.
  # Start the containers first:
  #   docker run -d --name capability_1_bi_apis_m3_environ \
  #       -v "$(pwd)/data/databases:/app/db:ro" \
  #       -v "$(pwd)/apis/configs:/app/apis/configs:ro" \
  #       -e MCP_DB_ROOT=/app/db \
  #       m3_environ
  #   docker run -d --name capability_2_dashboard_apis_m3_environ \
  #       -v "$(pwd)/data/databases:/app/db:ro" \
  #       -v "$(pwd)/apis/configs:/app/apis/configs:ro" \
  #       -e MCP_DB_ROOT=/app/db \
  #       m3_environ
  #   docker run -d --name capability_4_multiturn_m3_environ \
  #       -v "$(pwd)/data/databases:/app/db:ro" \
  #       -v "$(pwd)/apis/configs:/app/apis/configs:ro" \
  #       -v "$(pwd)/indexed_documents:/app/retrievers/chroma_data" \
  #       -v "$(pwd)/data/queries:/app/retrievers/queries:ro" \
  #       -e MCP_DB_ROOT=/app/db \
  #       m3_environ

  # Capability 1 (bi_apis): ToolCallingAgent + RouterMCPServer (routes to SlotFilling or Selection per query)
  1:
    mode: stdio
    container_name: capability_1_bi_apis_m3_environ
    container_runtime: null
    container_env:
      CAPABILITY_ID: "1"
      MCP_DB_ROOT: /app/db
      MCP_SERVER_TYPE: router
    container_command:
      - python
      - /app/mcp_dispatch.py

  # Capability 2 (dashboard_apis): LangGraphReActAgent + FastAPIMCPServer
  2:
    mode: stdio
    container_name: capability_2_dashboard_apis_m3_environ
    container_runtime: null
    container_env:
      CAPABILITY_ID: "2"
      MCP_DB_ROOT: /app/db
    container_command:
      - python
      - /app/mcp_dispatch.py

  # Capability 3 (multihop_reasoning): LangGraphReActAgent + task3_router (routes by MCP_DOMAIN)
  # MCP_DOMAIN=bpo     → /app/apis/bpo/mcp/server.py  (BPO FastMCP server)
  # MCP_DOMAIN=<other> → /app/m3-rest/mcp_server.py   (M3 REST MCP server)
  # The router exec's into the target server, so no proxy overhead.

  # Use the below to connect without the container (local Python subprocess):
  # 3:
  #   mode: stdio
  #   command: python  # resolved to sys.executable at runtime
  #   args:
  #     - "apis/bpo/mcp/task3_router.py"

  3:
    mode: stdio
    container_name: capability_3_multihop_reasoning_m3_environ
    container_runtime: null
    container_env:
      CAPABILITY_ID: "3"
      MCP_DB_ROOT: /app/db
    container_command:
      - python
      - /app/mcp_dispatch.py

  # Capability 4 (multiturn): LangGraphReActAgent + Task5CombinedMCPServer
  # Exposes M3 REST tools (port 8000) + Retriever query tool (port 8001)
  # in a single MCP server so list_tools() returns both sets.
  4:
    mode: stdio
    container_name: capability_4_multiturn_m3_environ
    container_runtime: null
    container_env:
      CAPABILITY_ID: "4"
      MCP_DB_ROOT: /app/db
      PRELOAD_COLLECTIONS: "false"
    container_command:
      - python
      - /app/mcp_dispatch.py

  # --- Per-capability container setup (no unified image) ---
  # Capability 1 runs as a local Python subprocess (no container needed).
  # Capabilities 2 and 4 use dedicated per-domain containers.
  #
  # 1:
  #   mode: stdio
  #   command: python  # resolved to sys.executable at runtime
  #   args:
  #     - "-m"
  #     - "apis.m3.python_tools.mcp"
  #
  # 2:
  #   mode: stdio
  #   container_name: fastapi-mcp-server
  #   container_runtime: null  # null = auto-detect (prefers podman, falls back to docker)
  #   container_command:
  #     - python
  #     - mcp_server.py
  #
  # 4:
  #   mode: stdio
  #   container_name: retriever-mcp-server
  #   container_runtime: null  # null = auto-detect (prefers podman, falls back to docker)
  #   container_command:
  #     - python
  #     - mcp_server.py
